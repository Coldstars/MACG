# Scoring rules for channel discovery.
# Total score: 100

weights:
  audience_match: 30
  content_fit: 20
  activity: 15
  sponsorship_readiness: 10
  contactability: 10
  authority_reach: 10
  long_term_search_value: 5

priority_thresholds:
  high: 80
  medium: 60

audience_keywords:
  ai_agent:
    - ai agent
    - ai agents
    - agentic
    - langchain
    - llamaindex
    - rag
    - retrieval augmented generation
    - llm
    - openai
    - claude
  developer:
    - python
    - javascript
    - api
    - developer
    - devtools
    - automation
    - workflow
    - n8n
  seo_data:
    - seo
    - rank tracking
    - serp
    - google search
    - bing search
    - web scraping
    - scraping
    - data extraction

content_fit_keywords:
  - tutorial
  - guide
  - how to
  - build
  - demo
  - walkthrough
  - hands-on
  - code
  - example
  - workflow
  - template

sponsor_keywords:
  - sponsor
  - sponsorship
  - advertise
  - advertising
  - media kit
  - partner
  - partnership
  - work with me
  - business inquiries
  - collaborations

collaboration_templates:
  ai_agent: "赞助教程：展示 {product_name} 如何支持 AI Agent 工作流。"
  rag: "技术教程：使用 {product_name} 为 LLM/RAG 工作流提供外部搜索上下文。"
  python_scraping: "赞助编程视频：围绕 {product_name} 构建一个实用的 Python 搜索数据工作流。"
  seo: "赞助文章或视频：展示 {product_name} 在搜索可见性、排名监控或 SEO 自动化中的用法。"
  n8n: "工作流模板：用 {product_name} 自动化一个可复用的搜索数据工作流。"
  general: "赞助技术教程或 Newsletter 露出：介绍 {product_name} 的搜索数据 API 场景。"
